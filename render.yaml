services:
  - type: web
    name: second-brain-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: second-brain-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_FILE
        value: /var/data/second-brain.json
      - key: ALLOWED_ORIGINS
        value: https://epap28.github.io,http://localhost:3000
      - key: AI_ENABLED
        value: false
      - key: SECOND_BRAIN_PASSWORD
        sync: false
